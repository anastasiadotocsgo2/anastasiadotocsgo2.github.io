<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оформление вертикального меню</title>
    <style>
        .menu {
            width: 200px;
            background: #d4819b;
        }
        
        .menu ul {
            list-style: none;
            margin: 0;
            padding: 5px 10px;
        }
        
        .menu li {
            padding: 5px 0;
        }
        
        .menu li a {
            display: block;
            padding: 10px;
            text-transform: uppercase;
            text-decoration: none;
            background: #ffe0e7;
            color: #b83b5e;
            font-family: Arial, sans-serif;
        }
        
        .menu li a:hover {
            background: #ffb3c6;
            color: #6b1e36;
        }
    </style>
</head>
<body>

<nav class="menu">
    <ul>
        <li><a href="#">Фильмы</a></li>
        <li><a href="#">Музыка</a></li>
        <li><a href="#">Софт</a></li>
        <li><a href="#">Игры</a></li>
    </ul>
</nav>

</body>
</html>
